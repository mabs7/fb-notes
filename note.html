<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Loading Note...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">Notes.</a>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="#classes" class="nav-link">Classes <span class="chevron">▾</span></a>
                <div class="dropdown-menu" id="nav-class-dropdown"></div>
            </div>
            
            <div class="nav-item">
                <a href="#subjects" class="nav-link">Subjects <span class="chevron">▾</span></a>
                <div class="dropdown-menu" id="nav-subject-dropdown"></div>
            </div>

            <div class="nav-item mobile-only">
                <a href="login.html" class="nav-link" style="color: var(--accent); font-weight: 500;">Admin Access</a>
            </div>
        </nav>
        
        <div class="nav-actions">
            <button id="theme-toggle" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">🌙</button>
            
            <a href="login.html" class="nav-link admin-link desktop-only">Admin</a>
            
            <button class="hamburger" aria-label="Toggle Menu">☰</button>
        </div>
    </header>

    <main style="max-width: 1000px; margin: 0 auto; padding: 40px 20px;">
        <div style="margin-bottom: 30px; text-align: center;">
            <h1 id="note-title" style="font-size: 2.5rem; margin-bottom: 10px;">Loading...</h1>
            <p id="note-meta" style="color: var(--text-muted); font-size: 1.1rem;">Retrieving document</p>
        </div>

        <div style="width: 100%; height: 80vh; background-color: var(--card-bg); border-radius: var(--radius-lg); box-shadow: var(--shadow-hover); overflow: hidden; border: 1px solid var(--border-light);">
            <iframe 
                id="note-iframe" 
                src="" 
                width="100%" 
                height="100%" 
                style="border: none;"
                allow="autoplay">
            </iframe>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
