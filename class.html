<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Class Subjects | FB Notes</title>
    <link rel="stylesheet" href="style.css">
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <a href="javascript:history.back()" class="back-arrow" aria-label="Go Back">
                &#10094;
            </a>
            <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">Notes.</a>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="#classes" class="nav-link">Classes <span class="chevron">▾</span></a>
                <div class="dropdown-menu" id="nav-class-dropdown"></div>
            </div>
            
            <div class="nav-item mobile-only">
                <a href="login.html" class="nav-link" style="color: var(--accent); font-weight: 500;">Admin Access</a>
            </div>
        </nav>
        
        <div class="nav-actions">
            <button id="theme-toggle" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">🌙</button>
            
            <a href="login.html" class="nav-link admin-link desktop-only">Admin</a>
            
            <button class="hamburger" aria-label="Toggle Menu">☰</button>
        </div>
    </header>

    <main>
        <section class="hero" style="padding: 60px 20px 40px; margin-bottom: 20px;">
            <h1 id="dynamic-class-name" style="font-size: 3rem;">Loading...</h1>
            <p style="color: var(--text-muted);">Select a subject below to view its available notes.</p>
        </section>

        <section class="class-section" style="max-width: 1000px; margin: 0 auto; padding: 0 20px;">
            <div id="dynamic-class-subject-grid" class="card-grid">
                </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="copyright">
            <p>&copy; 2026 FB Notes.</p>
        </div>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
