<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | FB Notes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">Notes.</a>
        </div>
        <div class="nav-right">
            <a href="index.html" class="nav-link admin-link" style="background-color: var(--card-bg); padding: 8px 16px; border-radius: var(--radius-pill); border: 1px solid var(--border-light);">Home</a>
        </div>
    </header>

    <main style="max-width: 600px; margin: 0 auto; padding: 40px 20px;">
        <section class="hero" style="background: none; border: none; padding: 40px 0; margin-bottom: 0;">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">Get in touch.</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem;">Have a question or found an error? Let us know.</p>
        </section>

        <section class="admin-card">
            <form class="admin-form" onsubmit="event.preventDefault(); alert('Message sent successfully! We will get back to you soon.'); this.reset();">
                <div class="form-row">
                    <input type="text" class="admin-input" placeholder="Your Name" required>
                    <input type="email" class="admin-input" placeholder="Your Email" required>
                </div>
                <input type="text" class="admin-input" placeholder="Subject" required>
                <textarea class="admin-input" rows="6" placeholder="How can we help you?" required style="resize: vertical; font-family: inherit;"></textarea>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Send Message</button>
            </form>
        </section>
    </main>

    <footer class="site-footer" style="margin-top: 60px;">
        <div class="copyright">
            <p>&copy; 2026 FB Notes.</p>
        </div>
    </footer>

</body>
</html>
