<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | FB Notes</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <a href="javascript:history.back()" class="back-arrow" aria-label="Go Back">
                &#10094;
            </a>
            <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">Notes.</a>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="#classes" class="nav-link">Classes <span class="chevron">▾</span></a>
                <div class="dropdown-menu" id="nav-class-dropdown"></div>
            </div>
            
            <div class="nav-item">
                <a href="#subjects" class="nav-link">Subjects <span class="chevron">▾</span></a>
                <div class="dropdown-menu" id="nav-subject-dropdown"></div>
            </div>

            <div class="nav-item mobile-only">
                <a href="login.html" class="nav-link" style="color: var(--accent); font-weight: 500;">Admin Access</a>
            </div>
        </nav>
        
        <div class="nav-actions">
            <button id="theme-toggle" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">🌙</button>
            
            <a href="login.html" class="nav-link admin-link desktop-only">Admin</a>
            
            <button class="hamburger" aria-label="Toggle Menu">☰</button>
        </div>
    </header>

    <main style="max-width: 600px; margin: 0 auto; padding: 40px 20px;">
        <section class="hero" style="background: none; border: none; padding: 40px 0; margin-bottom: 0;">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">Get in touch.</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem;">Have a question or found an error? Let us know.</p>
        </section>

        <section class="admin-card">
            <form class="admin-form" onsubmit="event.preventDefault(); alert('Message sent successfully! We will get back to you soon.'); this.reset();">
                <div class="form-row">
                    <input type="text" class="admin-input" placeholder="Your Name" required>
                    <input type="email" class="admin-input" placeholder="Your Email" required>
                </div>
                <input type="text" class="admin-input" placeholder="Subject" required>
                <textarea class="admin-input" rows="6" placeholder="How can we help you?" required style="resize: vertical; font-family: inherit;"></textarea>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">Send Message</button>
            </form>
        </section>
    </main>

    <footer class="site-footer" style="margin-top: 60px;">
        <div class="copyright">
            <p>&copy; 2026 FB Notes.</p>
        </div>
    </footer>

</body>
</html>
