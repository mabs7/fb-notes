<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--bg-color);">

    <header class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">Notes.</a>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="#classes" class="nav-link">Classes <span class="chevron">▾</span></a>
                <div class="dropdown-menu" id="nav-class-dropdown"></div>
            </div>
            
            <div class="nav-item">
                <a href="#subjects" class="nav-link">Subjects <span class="chevron">▾</span></a>
                <div class="dropdown-menu" id="nav-subject-dropdown"></div>
            </div>

            <div class="nav-item mobile-only">
                <a href="login.html" class="nav-link" style="color: var(--accent); font-weight: 500;">Admin Access</a>
            </div>
        </nav>
        
        <div class="nav-actions">
            <button id="theme-toggle" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">🌙</button>
            
            <a href="login.html" class="nav-link admin-link desktop-only">Admin</a>
            
            <button class="hamburger" aria-label="Toggle Menu">☰</button>
        </div>
    </header>

    <main class="admin-container">
        <h1 style="margin-bottom: 30px;">Settings</h1>

        <section class="admin-card">
            <h2>New Note</h2>
            <form id="form-add-note" class="admin-form">
                <input type="text" id="input-topic" class="admin-input" placeholder="Topic Title (e.g., Kinematics)" required>
                <input type="url" id="input-drive-link" class="admin-input" placeholder="Google Drive Share Link" required>
                <div class="form-row">
                    <select id="admin-class-dropdown" class="admin-input" required>
                        <option value="">Class</option>
                    </select>
                    <select id="admin-subject-dropdown" class="admin-input" required>
                        <option value="">Subject</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Publish Note</button>
            </form>
        </section>

        <section class="admin-card">
            <h2>Add Subject</h2>
            <form id="form-add-subject" class="admin-form">
                <input type="text" id="input-subject-id" class="admin-input" placeholder="Subject ID (e.g., urdu)" required>
                <input type="text" id="input-subject-name" class="admin-input" placeholder="Subject Name (e.g., Urdu)" required>
                <button type="submit" class="btn-primary" style="background-color: var(--text-main);">Add Subject</button>
            </form>
        </section>

        <section class="admin-card">
            <h2>Add Class</h2>
            <form id="form-add-class" class="admin-form">
                <input type="text" id="input-class-id" class="admin-input" placeholder="Class ID (e.g., 8)" required>
                <input type="text" id="input-class-name" class="admin-input" placeholder="Class Name (e.g., Class 8)" required>
                <button type="submit" class="btn-primary" style="background-color: var(--text-main);">Add Class</button>
            </form>
        </section>

        <section class="admin-card">
            <h2>Add Team Member</h2>
            <form id="form-add-team" class="admin-form">
                <input type="text" id="input-team-name" class="admin-input" placeholder="Name" required>
                <input type="text" id="input-team-role" class="admin-input" placeholder="Role/Subject" required>
                
                <div style="margin-top: 5px; margin-bottom: 5px;">
                    <label for="input-team-img" style="font-size: 0.9rem; color: var(--text-muted); display: block; margin-bottom: 5px;">Upload Profile Picture (1:1 Ratio Best)</label>
                    <input type="file" id="input-team-img" class="admin-input" accept="image/*" required style="padding: 10px;">
                </div>

                <button type="submit" class="btn-primary" style="background-color: var(--text-main);">Add Member</button>
            </form>
        </section>

        <section class="admin-card" style="border: 1px solid #ff3b30;">
            <h2 style="color: #ff3b30;">Erase All Data</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px;">This action cannot be undone.</p>
            <button id="btn-reset-db" class="btn-primary" style="background-color: #ff3b30; width: 100%;">Reset Database</button>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
